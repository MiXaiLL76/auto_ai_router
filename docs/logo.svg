<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <marker id="arrW" markerWidth="11" markerHeight="11" refX="9" refY="5.5"
            orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0.5 10,5.5 0,10.5" fill="white"/>
    </marker>
    <marker id="arrB" markerWidth="9" markerHeight="9" refX="7" refY="4.5"
            orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0.5 8,4.5 0,8.5" fill="#1a1a1a"/>
    </marker>
  </defs>

  <!-- ═══ WHITE HALO PASS ═══ -->
  <g stroke="white" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <text x="100" y="128"
          text-anchor="middle"
          font-family="'Arial Black', Impact, Arial, Helvetica, sans-serif"
          font-size="90" font-weight="900"
          textLength="188" lengthAdjust="spacingAndGlyphs"
          stroke-width="7">AIR</text>

    <line x1="100" y1="44" x2="100" y2="62"
          stroke-width="5" marker-end="url(#arrW)"/>

    <circle cx="100" cy="132" r="5" fill="white" stroke-width="5"/>

    <line x1="100" y1="132" x2="76"  y2="152" stroke-width="4.5"/>
    <line x1="100" y1="132" x2="100" y2="155" stroke-width="4.5"/>
    <line x1="100" y1="132" x2="124" y2="152" stroke-width="4.5"/>

    <circle cx="76"  cy="152" r="4" fill="white" stroke-width="4"/>
    <circle cx="100" cy="155" r="4" fill="white" stroke-width="4"/>
    <circle cx="124" cy="152" r="4" fill="white" stroke-width="4"/>

  </g>

  <!-- ═══ BLACK OUTLINE PASS ═══ -->
  <g stroke="#1a1a1a" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <text x="100" y="128"
          text-anchor="middle"
          font-family="'Arial Black', Impact, Arial, Helvetica, sans-serif"
          font-size="90" font-weight="900"
          textLength="188" lengthAdjust="spacingAndGlyphs"
          stroke-width="2">AIR</text>

    <line x1="100" y1="44" x2="100" y2="62"
          stroke-width="2.2" marker-end="url(#arrB)"/>

    <circle cx="100" cy="132" r="5" fill="white" stroke-width="2"/>

    <line x1="100" y1="132" x2="76"  y2="152" stroke-width="1.8"/>
    <line x1="100" y1="132" x2="100" y2="155" stroke-width="1.8"/>
    <line x1="100" y1="132" x2="124" y2="152" stroke-width="1.8"/>

    <circle cx="76"  cy="152" r="4" fill="white" stroke-width="1.5"/>
    <circle cx="100" cy="155" r="4" fill="white" stroke-width="1.5"/>
    <circle cx="124" cy="152" r="4" fill="white" stroke-width="1.5"/>

  </g>

</svg>
